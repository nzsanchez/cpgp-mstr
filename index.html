<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPP | MicroStrategy Support Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .disney-dark { background-color: #0c1c3c; }
        .disney-blue { background-color: #0063e5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="disney-dark py-4 px-8 flex justify-between items-center shadow-lg text-white">
        <div class="flex items-center space-x-2">
            <div class="bg-white text-slate-900 font-bold p-1 rounded text-[11px] italic">DPP</div>
            <div class="flex flex-col">
                <span class="font-bold text-sm tracking-wide">Support Portal</span>
                <span class="text-[9px] uppercase text-indigo-300 font-black italic">MicroStrategy Requests Only</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-12 px-6">
        
        <section id="intro" class="page-section fade-in">
            <h1 class="text-4xl font-extrabold text-slate-950 mb-6 italic leading-tight">How can we help with MicroStrategy?</h1>
            <div class="grid grid-cols-1 gap-6">
                <button onclick="goPath('path-broken')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-red-500 transition text-left group">
                    <span class="block text-2xl font-bold group-hover:text-red-600 mb-2 italic">"My report is broken or data is incorrect."</span>
                </button>
                <button onclick="goPath('path-new')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-indigo-500 transition text-left group">
                    <span class="block text-2xl font-bold group-hover:text-indigo-600 mb-2 italic">"I need to add new data or build a new report."</span>
                </button>
                <button onclick="goPath('path-platform')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-amber-500 transition text-left group">
                    <span class="block text-2xl font-bold group-hover:text-amber-600 mb-2 italic">"I need Platform or Cloud support."</span>
                </button>
            </div>
        </section>

        <section id="path-broken" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-sm font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-4">
                <h2 class="text-2xl font-black italic">Report Issue Details</h2>
                <input type="text" id="inc-num" placeholder="INC#######" class="w-full p-3 border rounded-lg bg-slate-50">
                <textarea id="desc-broken" rows="4" placeholder="What is wrong with the report?" class="w-full p-3 border rounded-lg bg-slate-50"></textarea>
                <input type="email" id="email-broken" placeholder="Your Disney Email" class="w-full p-3 border rounded-lg bg-slate-50">
                <button onclick="submitToAirtable('path-broken')" class="w-full disney-blue text-white font-bold py-4 rounded-xl uppercase italic">Submit Issue</button>
            </div>
        </section>

        <section id="path-new" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-sm font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-4">
                <h2 class="text-2xl font-black italic text-indigo-900">New Data/Report Request</h2>
                <input type="text" id="wbse-num" placeholder="WBSE / Billing Code" class="w-full p-3 border rounded-lg bg-slate-50">
                <textarea id="desc-new" rows="4" placeholder="Describe the new columns or logic needed..." class="w-full p-3 border rounded-lg bg-slate-50"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" id="email-new" placeholder="Your Email" class="w-full p-3 border rounded-lg bg-slate-50">
                    <input type="date" id="date-new" class="w-full p-3 border rounded-lg bg-slate-50">
                </div>
                <button onclick="submitToAirtable('path-new')" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl uppercase italic">Submit Request</button>
            </div>
        </section>

        <section id="path-platform" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-sm font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-sm space-y-4">
                <h2 class="text-2xl font-black italic text-amber-900">Platform Support</h2>
                <textarea id="desc-platform" rows="4" placeholder="Describe the access or system issue..." class="w-full p-3 border rounded-lg bg-slate-50"></textarea>
                <input type="email" id="email-platform" placeholder="Your Email" class="w-full p-3 border rounded-lg bg-slate-50">
                <button onclick="submitToAirtable('path-platform')" class="w-full bg-amber-600 text-white font-bold py-4 rounded-xl uppercase italic">Submit Platform Request</button>
            </div>
        </section>

        <section id="final" class="page-section hidden fade-in text-center py-12">
            <div class="h-20 w-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 class="text-4xl font-black italic">Request Submitted!</h2>
            <p class="text-slate-600 mt-4 text-lg italic">The DPP team has been notified.</p>
            <button onclick="location.reload()" class="mt-8 bg-slate-900 text-white font-bold py-3 px-8 rounded-xl uppercase text-sm">New Request</button>
        </section>

    </main>

    <script>
        const AIRTABLE_WEBHOOK_URL = "https://hooks.airtable.com/workflows/v1/genericWebhook/appg6FxdMBA9WWkUy/wflbYA4lQ2OZUo5ee/wtrpqOcmceNhbuwcW";

        function goPath(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function submitToAirtable(path) {
            let payload = {};
            
            if (path === 'path-broken') {
                payload = {
                    RequestType: "Broken Report",
                    ReferenceNumber: document.getElementById('inc-num').value,
                    Description: document.getElementById('desc-broken').value,
                    RequesterEmail: document.getElementById('email-broken').value
                };
            } else if (path === 'path-new') {
                payload = {
                    RequestType: "Incremental Request",
                    ReferenceNumber: document.getElementById('wbse-num').value,
                    Description: document.getElementById('desc-new').value,
                    RequesterEmail: document.getElementById('email-new').value,
                    DateNeeded: document.getElementById('date-new').value
                };
            } else if (path === 'path-platform') {
                payload = {
                    RequestType: "Platform Support",
                    Description: document.getElementById('desc-platform').value,
                    RequesterEmail: document.getElementById('email-platform').value
                };
            }

            console.log("Sending to Airtable:", payload);

            try {
                // Send data to Airtable
                fetch(AIRTABLE_WEBHOOK_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                // Switch to success screen immediately
                document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
                document.getElementById('final').classList.remove('hidden');
            } catch (e) {
                alert("Submission failed. Check your connection.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
