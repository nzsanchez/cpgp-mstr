<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPP | MicroStrategy Support Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .disney-dark { background-color: #0c1c3c; }
        .disney-blue { background-color: #0063e5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 leading-normal">

    <nav class="disney-dark py-4 px-8 flex justify-between items-center shadow-lg text-white">
        <div class="flex items-center space-x-2">
            <div class="bg-white text-slate-900 font-bold p-1 rounded text-[11px] italic">DPP</div>
            <div class="flex flex-col text-sm font-bold">Support Portal</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-12 px-6">
        
        <section id="intro" class="page-section fade-in">
            <h1 class="text-4xl font-extrabold text-slate-950 mb-6 italic">How can we help with MicroStrategy?</h1>
            <div class="grid grid-cols-1 gap-6">
                <button onclick="goPath('path-broken')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-red-500 transition text-left group shadow-sm">
                    <span class="block text-2xl font-bold italic group-hover:text-red-600 mb-2">"My report is broken or the data is incorrect."</span>
                </button>
                <button onclick="goPath('path-new')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-indigo-500 transition text-left group shadow-sm">
                    <span class="block text-2xl font-bold italic group-hover:text-indigo-600 mb-2">"I need to add new data or build a new report."</span>
                </button>
                <button onclick="goPath('path-platform')" class="p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-amber-500 transition text-left group shadow-sm">
                    <span class="block text-2xl font-bold italic group-hover:text-amber-600 mb-2">"I need Platform support."</span>
                </button>
            </div>
        </section>

        <section id="path-broken" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-xs font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-md space-y-4">
                <input type="text" id="inc-num" placeholder="ServiceNow INC#" class="w-full p-4 border rounded-xl bg-slate-50">
                <textarea id="desc-broken" rows="4" placeholder="Description of the discrepancy..." class="w-full p-4 border rounded-xl bg-slate-50"></textarea>
                <input type="email" id="email-broken" placeholder="Your Disney Email" class="w-full p-4 border rounded-xl bg-slate-50">
                <button onclick="submitToAirtable('path-broken')" class="w-full disney-blue text-white font-bold py-4 rounded-xl uppercase italic shadow-lg">Submit Issue</button>
            </div>
        </section>

        <section id="path-new" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-xs font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-md space-y-4">
                <input type="text" id="wbse-num" placeholder="WBSE Billing Code" class="w-full p-4 border rounded-xl bg-slate-50">
                <textarea id="desc-new" rows="4" placeholder="New data or report requirements..." class="w-full p-4 border rounded-xl bg-slate-50"></textarea>
                <input type="email" id="email-new" placeholder="Your Disney Email" class="w-full p-4 border rounded-xl bg-slate-50">
                <input type="date" id="date-new" class="w-full p-4 border rounded-xl bg-slate-50">
                <button onclick="submitToAirtable('path-new')" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl uppercase italic shadow-lg">Submit Request</button>
            </div>
        </section>

        <section id="path-platform" class="page-section hidden fade-in space-y-6">
            <button onclick="goBack('intro')" class="text-xs font-black text-indigo-700 uppercase">← Back</button>
            <div class="bg-white p-8 rounded-2xl border shadow-md space-y-4">
                <textarea id="desc-platform" rows="4" placeholder="Describe the access or system issue..." class="w-full p-4 border rounded-xl bg-slate-50"></textarea>
                <input type="email" id="email-platform" placeholder="Your Disney Email" class="w-full p-4 border rounded-xl bg-slate-50">
                <input type="date" id="date-platform" class="w-full p-4 border rounded-xl bg-slate-50">
                <button onclick="submitToAirtable('path-platform')" class="w-full bg-amber-600 text-white font-bold py-4 rounded-xl uppercase italic shadow-lg">Submit Platform Request</button>
            </div>
        </section>

        <section id="final" class="page-section hidden fade-in text-center py-20">
            <h2 class="text-5xl font-black italic mb-4">Success!</h2>
            <p class="text-slate-600 text-xl mb-10 italic">Your request is being routed to the DPP team.</p>
            <button onclick="location.reload()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold uppercase tracking-widest">Submit Another</button>
        </section>

    </main>

    <script>
        const WEBHOOK = "https://hooks.airtable.com/workflows/v1/genericWebhook/appg6FxdMBA9WWkUy/wflbYA4lQ2OZUo5ee/wtrpqOcmceNhbuwcW";

        function goPath(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack(id) { goPath(id); }

        async function submitToAirtable(path) {
            let payload = { RequestType: "", ReferenceNumber: "", Description: "", RequesterEmail: "", DateNeeded: "" };

            if (path === 'path-broken') {
                payload.RequestType = "Broken Report";
                payload.ReferenceNumber = document.getElementById('inc-num').value;
                payload.Description = document.getElementById('desc-broken').value;
                payload.RequesterEmail = document.getElementById('email-broken').value;
            } else if (path === 'path-new') {
                payload.RequestType = "Incremental Request";
                payload.ReferenceNumber = document.getElementById('wbse-num').value;
                payload.Description = document.getElementById('desc-new').value;
                payload.RequesterEmail = document.getElementById('email-new').value;
                payload.DateNeeded = document.getElementById('date-new').value;
            } else if (path === 'path-platform') {
                payload.RequestType = "Platform Support";
                payload.Description = document.getElementById('desc-platform').value;
                payload.RequesterEmail = document.getElementById('email-platform').value;
                payload.DateNeeded = document.getElementById('date-platform').value;
            }

            console.log("SENDING DATA:", payload);

            try {
                // This is the actual push to Airtable
                fetch(WEBHOOK, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                // Show success screen
                document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
                document.getElementById('final').classList.remove('hidden');
            } catch (e) {
                console.error("CRITICAL ERROR:", e);
            }
        }
    </script>
</body>
</html>
